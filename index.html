<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manualidades CyC - Bienvenida</title>
    
    <!-- Importamos la tipografía secundaria (Poppins) desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* 
           💡 TIP PARA MÁS ADELANTE:
           Cuando subas el archivo de tu tipografía "Gilker" a tu repositorio,
           descomentás estas líneas de abajo para que la web la tome de forma nativa.
        */
        /*
        @font-face {
            font-family: 'Gilker';
            src: url('Gilker-Bold.otf') format('opentype');
            font-weight: bold;
        }
        */

        /* --- ESTILOS GENERALES (Naranja y Blanco) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fondo blanco puro */
            font-family: 'Poppins', sans-serif; /* Tipografía secundaria */
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .bloque-inicio {
            text-align: center;
            background: #ffffff;
            padding: 45px 30px;
            border-radius: 24px;
            border: 3px solid #ff6b00; /* Borde Naranja CyC */
            box-shadow: 0 12px 35px rgba(255, 107, 0, 0.12);
            max-width: 420px;
            width: 90%;
            box-sizing: border-box;
        }

        /* --- BRANDING / LOGO (Tipografía Gilker) --- */
        .logo-principal {
            /* Fallback a Arial Black por si Gilker no cargó todavía, para mantener el peso visual */
            font-family: 'Gilker', 'Arial Black', sans-serif; 
            font-size: 26px;
            font-weight: 900;
            color: #ff6b00;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .logo-secundario {
            font-family: 'Gilker', 'Arial Black', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: #ff6b00;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        /* --- TEXTOS INSTRUCTIVOS (Poppins) --- */
        .instrucciones {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        /* --- CASILLEROS DE ENTRADA (Inputs) --- */
        .campo-texto {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Efecto cuando hacen foco en los inputs */
        .campo-texto:focus {
            border-color: #ff6b00;
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.15);
        }

        /* Forzamos que el input del código se escriba siempre en mayúsculas de forma visual */
        #inputCodigo {
            text-transform: uppercase;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- BOTÓN PRINCIPAL (Naranja) --- */
        .btn-crear {
            width: 100%;
            background-color: #ff6b00;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            margin-top: 10px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        /* Efectos de interacción para el botón */
        .btn-crear:hover {
            background-color: #e05e00; /* Naranja un poco más oscuro */
        }

        .btn-crear:active {
            transform: scale(0.98); /* Simula el hundimiento al clickear */
        }
    </style>
</head>
<body>

    <!-- BLOQUE 1: INICIO / REGISTRO ACCESO -->
    <div class="bloque-inicio">
        
        <!-- Nombre de la marca dividido para dar balance al diseño -->
        <h1 class="logo-principal">Manualidades</h1>
        <div class="logo-secundario">CyC</div>
        
        <p class="instrucciones">Completá tus datos e ingresá el código de acceso de tu patrón para comenzar el taller.</p>
        
        <!-- Inputs requeridos para el acceso -->
        <input type="email" class="campo-texto" placeholder="Tu correo electrónico" required>
        <input type="text" id="inputCodigo" class="campo-texto" placeholder="Código de acceso">
        
        <!-- Botón de acción principal -->
        <button class="btn-crear">Comenzar a Crear</button>
        
    </div>

</body>
</html>
