<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manualidades CyC - Acceso</title>
    
    <!-- Importamos la tipografía Poppins para los textos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* 
           💡 NOTA PARA LUDMILA:
           Cuando tengas el archivo de tu tipografía (ej: "Gilker-Bold.otf"), 
           lo subís a la misma carpeta de GitHub y descomentás estas líneas de abajo 
           para que la web use tu tipografía real.
        */
        /*
        @font-face {
            font-family: 'Gilker';
            src: url('Gilker-Bold.otf') format('opentype');
            font-weight: bold;
        }
        */

        /* --- ESTILOS GENERALES (Naranja y Blanco) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- CONTENEDOR DE LA PANTALLA --- */
        .caja-acceso {
            text-align: center;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            border: 3px solid #ff6b00; 
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.1);
            max-width: 440px; /* Lo agrandamos un toque para dar más aire */
            width: 90%;
            box-sizing: border-box;
        }

        /* --- LOGO (Manualidades CyC) --- */
        .logo-marca {
            /* Mientras tanto usa una sans-serif del sistema bien gruesa, luego usará Gilker */
            font-family: 'Gilker', 'Arial Black', sans-serif; 
            font-size: 24px; /* Achicado para que NUNCA se salga del cuadro */
            font-weight: 900;
            color: #ff6b00;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        
        .logo-sub {
            font-family: 'Gilker', 'Arial Black', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #ff6b00;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        /* --- TEXTOS (Poppins) --- */
        p {
            color: #666666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        /* --- CASILLERO DE TEXTO --- */
        .input-codigo {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-codigo:focus {
            border-color: #ff6b00;
        }

        /* --- BOTÓN DE INGRESO --- */
        .btn-entrar {
            width: 100%;
            background-color: #ff6b00;
            color: #ffffff;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            margin-top: 20px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-entrar:hover {
            background-color: #e05e00;
        }
        
        .btn-entrar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="caja-acceso">
        <!-- Dividí el título en dos líneas para que respire y tenga toda la fuerza visual -->
        <div class="logo-marca">Manualidades</div>
        <div class="logo-sub">CyC</div>
        
        <p>¡Hola! Ingresá el código de acceso exclusivo que te llegó con tu compra para empezar a tejer.</p>
        
        <input type="text" class="input-codigo" placeholder="Escribí tu código acá">
        <button class="btn-entrar">Comenzar Tutorial</button>
    </div>

</body>
</html>
